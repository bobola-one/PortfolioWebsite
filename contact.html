<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Contact | Akinbobola Caleb Adefolu</title>
   <link rel="stylesheet" href="style.css">
   <!--Kit for icons-->
   <script src="https://kit.fontawesome.com/f718d0f5c5.js" crossorigin="anonymous"></script>
</head>
<body>
 
   <header class="site-header">
      <nav class="navbar">
         <a href="index.html" class="nav-logo">Akinbobola</a>
         <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="projects.html">Projects</a></li>
         </ul>
      </nav>
   </header>
 
   <main>
      <section class="contact-section">
         <h1>Get in Touch</h1>
         <p class="intro">Have a question or a role you think I'd be a good fit for? Send me a message below.</p>
 
         <form class="contact-form-container">
 
            <div class="form-field">
               <label for="name">Name</label>
               <input type="text" id="name" name="name" placeholder="Your full name" required>
            </div>
 
            <div class="form-field">
               <label for="email">Email</label>
               <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
 
            <div class="form-field">
               <label for="subject">Subject</label>
               <input type="text" id="subject" name="subject" placeholder="What's this about?" minlength="3" maxlength="80" required>
               <small class="field-hint">3-80 characters</small>
            </div>
 
            <div class="form-field">
               <label for="message">Message</label>
               <textarea id="message" name="message" placeholder="Write your message here..." minlength="10" maxlength="500" required></textarea>
               <small class="field-hint">10-500 characters</small>
            </div>
 
            <button type="submit" class="btn-primary">Send Message</button>
         </form>
      </section>
   </main>
 
   <footer>
      <nav class="footer-nav">
         <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="projects.html">Projects</a></li>
         </ul>
      </nav>
   </footer>
 
</body>
</html>
